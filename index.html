<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✨ 刘雨晴，生日快乐!</title>
<style>
  :root {
    --card-bg: rgba(20, 20, 50, 0.92);
    --gold: #f4d58d;
    --gold-bright: #ffe8b0;
    --star-glow: #ffeaa7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    background: #0a0a1a;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    cursor: default;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ===== Canvas 背景 ===== */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  /* ===== 主界面 ===== */
  #ui-layer {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }

  /* ===== 标题 ===== */
  #header {
    position: absolute;
    top: clamp(20px, 5vh, 50px);
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
  }

  #header .title {
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 700;
    color: #ffe8b0;
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px rgba(244, 213, 141, 0.5), 0 0 80px rgba(244, 213, 141, 0.25);
    animation: titleGlow 3s ease-in-out infinite;
  }

  @keyframes titleGlow {
    0%, 100% { text-shadow: 0 0 30px rgba(244, 213, 141, 0.5), 0 0 80px rgba(244, 213, 141, 0.25); }
    50%      { text-shadow: 0 0 40px rgba(244, 213, 141, 0.7), 0 0 100px rgba(244, 213, 141, 0.4); }
  }

  #header .subtitle {
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    color: rgba(200, 200, 230, 0.75);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  /* ===== 计数器 ===== */
  #counter {
    position: absolute;
    bottom: clamp(20px, 5vh, 40px);
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(0.85rem, 2vw, 1rem);
    color: rgba(200, 200, 230, 0.7);
    letter-spacing: 0.04em;
    transition: all 0.5s ease;
  }

  #counter .count {
    color: #f4d58d;
    font-weight: 700;
    font-size: 1.2em;
  }

  #counter.complete {
    color: #f4d58d;
    animation: counterGlow 1.5s ease-in-out infinite;
  }

  @keyframes counterGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(244, 213, 141, 0.4); }
    50%      { text-shadow: 0 0 25px rgba(244, 213, 141, 0.9); }
  }

  /* ===== 互动星星容器 ===== */
  #stars-layer {
    position: fixed;
    inset: 80px 20px 80px 20px;
    z-index: 5;
    pointer-events: none;
  }

  /* ===== 单颗许愿星 ===== */
  .wish-star {
    position: absolute;
    width: 36px;
    height: 36px;
    pointer-events: auto;
    cursor: pointer;
    transform: translate(-50%, -50%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1;
  }

  .wish-star:hover {
    transform: translate(-50%, -50%) scale(1.3);
    z-index: 2;
  }

  .wish-star:active {
    transform: translate(-50%, -50%) scale(0.95);
  }

  /* 星星核心 */
  .wish-star .star-core {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wish-star .star-shape {
    width: 18px;
    height: 18px;
    background: radial-gradient(circle, #ffffff 0%, #ffe8b0 30%, #f4d58d 60%, transparent 100%);
    border-radius: 50%;
    box-shadow: 0 0 12px 3px rgba(244, 213, 141, 0.5), 0 0 30px 6px rgba(244, 213, 141, 0.2);
    transition: all 0.5s ease;
    animation: starPulse 2.5s ease-in-out infinite;
  }

  /* 不同的闪烁节奏 */
  .wish-star:nth-child(odd) .star-shape  { animation-delay: 0s; }
  .wish-star:nth-child(even) .star-shape { animation-delay: 0.8s; }
  .wish-star:nth-child(3n) .star-shape   { animation-delay: 1.6s; }
  .wish-star:nth-child(5n) .star-shape   { animation-delay: 0.4s; }

  @keyframes starPulse {
    0%, 100% { box-shadow: 0 0 12px 3px rgba(244, 213, 141, 0.5), 0 0 30px 6px rgba(244, 213, 141, 0.2); transform: scale(1); }
    50%      { box-shadow: 0 0 18px 4px rgba(244, 213, 141, 0.7), 0 0 45px 9px rgba(244, 213, 141, 0.3); transform: scale(1.15); }
  }

  /* 已发现的星星 */
  .wish-star.discovered .star-shape {
    background: radial-gradient(circle, #ffffff 0%, #ffdd80 25%, #f0c040 55%, transparent 100%);
    box-shadow: 0 0 20px 5px rgba(240, 192, 64, 0.7), 0 0 45px 10px rgba(240, 192, 64, 0.3);
    animation: starPulseDiscovered 2s ease-in-out infinite;
  }

  @keyframes starPulseDiscovered {
    0%, 100% { box-shadow: 0 0 20px 5px rgba(240, 192, 64, 0.7), 0 0 45px 10px rgba(240, 192, 64, 0.3); transform: scale(1); }
    50%      { box-shadow: 0 0 28px 7px rgba(240, 192, 64, 0.9), 0 0 60px 14px rgba(240, 192, 64, 0.45); transform: scale(1.2); }
  }

  /* 星星的十字光芒 (四角星) */
  .wish-star .star-rays {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .wish-star .star-rays::before,
  .wish-star .star-rays::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 232, 176, 0.5);
    border-radius: 2px;
    transition: all 0.5s ease;
  }

  .wish-star .star-rays::before {
    width: 2px;
    height: 28px;
  }

  .wish-star .star-rays::after {
    width: 28px;
    height: 2px;
  }

  .wish-star.discovered .star-rays::before,
  .wish-star.discovered .star-rays::after {
    background: rgba(240, 192, 64, 0.7);
  }

  /* 星芒旋转 */
  .wish-star .star-sparkle {
    position: absolute;
    inset: -6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .wish-star.discovered .star-sparkle {
    opacity: 1;
    animation: sparkleSpin 8s linear infinite;
  }

  @keyframes sparkleSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .wish-star .star-sparkle::before,
  .wish-star .star-sparkle::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 220, 150, 0.35);
    border-radius: 1px;
  }

  .wish-star .star-sparkle::before {
    width: 1.5px;
    height: 40px;
  }

  .wish-star .star-sparkle::after {
    width: 40px;
    height: 1.5px;
  }

  /* ===== 卡片弹窗 ===== */
  #card-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(5, 5, 20, 0);
    pointer-events: none;
    transition: background 0.4s ease;
  }

  #card-overlay.active {
    background: rgba(5, 5, 20, 0.7);
    pointer-events: auto;
  }

  #card {
    width: min(92vw, 480px);
    max-height: 85vh;
    max-height: 85dvh;
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(244, 213, 141, 0.3);
    border-radius: 20px;
    overflow-y: auto;
    overflow-x: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(244, 213, 141, 0.1);
    transform: translateY(30px) scale(0.95);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease;
  }

  #card-overlay.active #card {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  /* 滚动条 */
  #card::-webkit-scrollbar { width: 4px; }
  #card::-webkit-scrollbar-track { background: transparent; }
  #card::-webkit-scrollbar-thumb { background: rgba(244, 213, 141, 0.25); border-radius: 4px; }

  #card .card-photo {
    width: 100%;
    max-height: 45vh;
    max-height: 45dvh;
    object-fit: contain;
    display: block;
    border-radius: 20px 20px 0 0;
    background: rgba(0, 0, 0, 0.3);
  }

  #card .card-photo-placeholder {
    width: 100%;
    height: 60px;
    background: linear-gradient(180deg, rgba(244, 213, 141, 0.1) 0%, transparent 100%);
    border-radius: 20px 20px 0 0;
  }

  #card .card-body {
    padding: 24px 28px 28px;
  }

  #card .card-star-icon {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 12px;
    animation: starPulse 2s ease-in-out infinite;
  }

  #card .card-text {
    font-size: clamp(1rem, 3vw, 1.15rem);
    line-height: 1.85;
    color: rgba(230, 225, 240, 0.9);
    text-align: center;
    letter-spacing: 0.03em;
  }

  #card .card-index {
    text-align: center;
    font-size: 0.78rem;
    color: rgba(244, 213, 141, 0.5);
    margin-top: 16px;
    letter-spacing: 0.06em;
  }

  #card .card-close {
    display: block;
    margin: 20px auto 0;
    padding: 10px 32px;
    background: rgba(244, 213, 141, 0.12);
    border: 1px solid rgba(244, 213, 141, 0.3);
    border-radius: 25px;
    color: #f4d58d;
    font-size: 0.95rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.25s ease;
    font-family: inherit;
  }

  #card .card-close:hover {
    background: rgba(244, 213, 141, 0.22);
    box-shadow: 0 0 20px rgba(244, 213, 141, 0.2);
  }

  /* ===== 完成提示 ===== */
  #complete-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    z-index: 200;
    pointer-events: none;
    text-align: center;
    opacity: 0;
    transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  #complete-toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  #complete-toast .big-star {
    font-size: 4rem;
    animation: starPulse 1.5s ease-in-out infinite;
    display: block;
  }

  #complete-toast .complete-msg {
    font-size: 1.3rem;
    color: #ffe8b0;
    margin-top: 8px;
    letter-spacing: 0.06em;
    text-shadow: 0 0 20px rgba(244, 213, 141, 0.6);
  }

  /* ===== 提示文字 ===== */
  #hint {
    position: fixed;
    bottom: clamp(60px, 12vh, 100px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 0.85rem;
    color: rgba(200, 200, 230, 0.5);
    letter-spacing: 0.04em;
    animation: hintFade 3s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes hintFade {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 0.85; }
  }

  /* ===== 粒子容器 ===== */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 50;
    border-radius: 50%;
    animation: particleBurst 0.8s ease-out forwards;
  }

  @keyframes particleBurst {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<!-- 星空背景画布 -->
<canvas id="bg-canvas"></canvas>

<!-- 互动星星层 -->
<div id="stars-layer"></div>

<!-- 标题/UI层 -->
<div id="ui-layer">
  <div id="header">
    <div class="title">✨ 刘雨晴，生日快乐!</div>
    <div class="subtitle">每一颗星，都有一句想对你说的话</div>
  </div>
  <div id="counter">发现了 <span class="count">0</span> / 15 颗星星</div>
</div>

<!-- 提示文字 -->
<div id="hint">🌟 点一点星星，打开一个心愿</div>

<!-- 卡片弹窗 -->
<div id="card-overlay">
  <div id="card">
    <img class="card-photo" src="" alt="" style="display:none" />
    <div class="card-photo-placeholder"></div>
    <div class="card-body">
      <div class="card-star-icon">⭐</div>
      <div class="card-text"></div>
      <div class="card-index"></div>
      <button class="card-close">收下这颗星 ✨</button>
    </div>
  </div>
</div>

<!-- 完成提示 -->
<div id="complete-toast">
  <span class="big-star">🌟</span>
  <div class="complete-msg">所有的星星都为你点亮了</div>
</div>

<script>
// ============================================================================
//  🎂 重点在这里！！在下面编辑你的祝福语和照片 👇
// ============================================================================
//  每条祝福是一个对象：
//    text:  "你想说的话",
//    photo: "照片文件名.jpg"  或  null（不需要照片就写 null）
//
//  把照片文件放在和这个 HTML 同一个文件夹里就行！
//  支持 jpg / png / webp
// ============================================================================

const wishes = [
  {
    text: "恭喜你在地球online这款游戏中，又成功续费一年VIP！",
    photo: "7.png"
  },
  {
    text: "愿你在新的一岁，匹配到的全是厉害的队友(特别是我这种),打出的全是叮叮叮的爆头！，遇到的全是人体描边大师！",
    photo: "8.png"
  },
  {
    text: "你刘姐打台球！",
    photo: "6.png"
  },
  {
    text: "跟你玩了这么久，发现你变外向活泼了很多，替你感到高兴！",
    photo: null
  },
  {
    text: "上无畏契约有惊喜哦！",
    photo: null
  },
  {
    text: "奶茶卡一张！持有词卡可以无条件赠送奶茶一杯，品牌任选！",
    photo: "5.png"
  },
  {
    text: "一起看海",
    photo: "3.png"
  },
  {
    text: "大制作哦！",
    photo: "2.png"
  },
  {
    text: "天天开♥",
    photo: "1.png"
  },
  {
    text: "你刘姐的五杀！！！",
    photo: "4.png"
  },
  {
    text: "谢谢你一直陪我玩游戏，陪我走过无数个地图，拿过无数次胜利，生日快乐，我的固玩",
    photo: null
  },
  {
    text: "祝贺你长大成人，可以去网吧了！你刘姐必须订个电竞酒店狠狠玩！",
    photo: null
  },
  {
    text: "生日快乐呀！希望你许的愿望都能实现，就像你点亮的这些星星一样，一颗一颗，慢慢成真。",
    photo: null
  },
  {
    text: "你是我认识的人里，最会让人感到被理解的那一个。",
    photo: null
  },
  {
    text: "你玩游戏很厉害，学东西很快，并没有别人说的那么菜，希望你越来越强，越来越厉害！",
    photo: null
  }
];

// ============================================================================
//  编辑完上面的内容就可以了，下面的代码不用改 👇
// ============================================================================

// ========== Canvas 星空背景 ==========
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H;

// 背景星星
let bgStars = [];
const BG_STAR_COUNT = 250;

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function createBgStars() {
  bgStars = [];
  for (let i = 0; i < BG_STAR_COUNT; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.3,
      baseAlpha: Math.random() * 0.5 + 0.3,
      alpha: 0,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2,
      hue: Math.random() < 0.15 ? 210 : Math.random() < 0.3 ? 40 : 0,
    });
  }
}

// 流星
let shootingStars = [];

function spawnShootingStar() {
  const fromLeft = Math.random() > 0.5;
  shootingStars.push({
    x: fromLeft ? Math.random() * W * 0.4 : W * 0.6 + Math.random() * W * 0.4,
    y: Math.random() * H * 0.3,
    vx: fromLeft ? (2.5 + Math.random() * 4) : -(2.5 + Math.random() * 4),
    vy: 1.2 + Math.random() * 2.5,
    life: 1,
    decay: 0.008 + Math.random() * 0.02,
    len: 60 + Math.random() * 100,
  });
}

function drawBgStars(time) {
  // 星云光晕
  const nebula1 = ctx.createRadialGradient(W * 0.3, H * 0.35, 0, W * 0.3, H * 0.35, W * 0.5);
  nebula1.addColorStop(0, 'rgba(30, 20, 60, 0.15)');
  nebula1.addColorStop(0.5, 'rgba(20, 15, 45, 0.06)');
  nebula1.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = nebula1;
  ctx.fillRect(0, 0, W, H);

  const nebula2 = ctx.createRadialGradient(W * 0.7, H * 0.6, 0, W * 0.7, H * 0.6, W * 0.4);
  nebula2.addColorStop(0, 'rgba(20, 30, 70, 0.1)');
  nebula2.addColorStop(0.5, 'rgba(15, 20, 50, 0.04)');
  nebula2.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = nebula2;
  ctx.fillRect(0, 0, W, H);

  // 背景星星
  for (const s of bgStars) {
    s.alpha = s.baseAlpha + Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.25;
    s.alpha = Math.max(0.1, Math.min(0.9, s.alpha));

    let color;
    if (s.hue === 210) {
      color = `rgba(180,200,255,${s.alpha})`;
    } else if (s.hue === 40) {
      color = `rgba(255,240,210,${s.alpha})`;
    } else {
      color = `rgba(255,255,255,${s.alpha})`;
    }

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // 稍大的星星加辉光
    if (s.r > 1.2 && s.alpha > 0.55) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = color.replace(/[\d.]+\)$/, `${s.alpha * 0.15})`);
      ctx.fill();
    }
  }

  // 流星
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const m = shootingStars[i];
    m.x += m.vx;
    m.y += m.vy;
    m.life -= m.decay;

    if (m.life <= 0) {
      shootingStars.splice(i, 1);
      continue;
    }

    const endX = m.x - m.vx * m.len * 0.06;
    const endY = m.y - m.vy * m.len * 0.06;

    const grad = ctx.createLinearGradient(m.x, m.y, endX, endY);
    grad.addColorStop(0, `rgba(255,255,255,${m.life})`);
    grad.addColorStop(0.1, `rgba(255,240,220,${m.life * 0.8})`);
    grad.addColorStop(1, 'rgba(255,240,220,0)');

    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 头部亮点
    ctx.beginPath();
    ctx.arc(m.x, m.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${m.life})`;
    ctx.fill();
  }
}

// ========== 互动星星 ==========
const starsLayer = document.getElementById('stars-layer');
const cardOverlay = document.getElementById('card-overlay');
const card = document.getElementById('card');
const cardPhoto = card.querySelector('.card-photo');
const cardPhotoPlaceholder = card.querySelector('.card-photo-placeholder');
const cardText = card.querySelector('.card-text');
const cardIndex = card.querySelector('.card-index');
const cardClose = card.querySelector('.card-close');
const counterEl = document.getElementById('counter');
const countSpan = counterEl.querySelector('.count');
const hintEl = document.getElementById('hint');
const completeToast = document.getElementById('complete-toast');

let discovered = new Set();
let totalStars = 0;
let currentStarIndex = -1;

function createWishStars() {
  starsLayer.innerHTML = '';
  const count = Math.min(wishes.length, 20);
  totalStars = count;

  // 使用泊松采样避免重叠
  const positions = poissonSample(count, 80);

  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.className = 'wish-star';
    star.dataset.index = i;
    star.style.left = (positions[i].x * 100) + '%';
    star.style.top = (positions[i].y * 100) + '%';
    star.style.animationDelay = (i * 0.1) + 's';

    star.innerHTML = `
      <div class="star-sparkle"></div>
      <div class="star-rays"></div>
      <div class="star-core">
        <div class="star-shape"></div>
      </div>
    `;

    star.addEventListener('click', (e) => {
      e.stopPropagation();
      openCard(i, star);
    });

    starsLayer.appendChild(star);
  }
}

function poissonSample(count, minDist) {
  // 在百分比空间 [0,1] 中进行采样，最小距离为 minDist/100
  const minD = minDist / 100;
  const positions = [];
  const maxAttempts = count * 30;
  let attempts = 0;

  while (positions.length < count && attempts < maxAttempts) {
    attempts++;
    const candidate = {
      x: 0.08 + Math.random() * 0.84,
      y: 0.06 + Math.random() * 0.88,
    };

    let tooClose = false;
    for (const p of positions) {
      const dx = p.x - candidate.x;
      const dy = p.y - candidate.y;
      if (Math.sqrt(dx * dx + dy * dy) < minD) {
        tooClose = true;
        break;
      }
    }

    if (!tooClose) {
      positions.push(candidate);
    }
  }

  // 如果没凑够，用随机位置填充
  while (positions.length < count) {
    positions.push({
      x: 0.08 + Math.random() * 0.84,
      y: 0.06 + Math.random() * 0.88,
    });
  }

  return positions;
}

// ========== 卡片弹窗 ==========
function openCard(index, starEl) {
  currentStarIndex = index;
  const wish = wishes[index];

  // 照片
  if (wish.photo) {
    cardPhoto.src = wish.photo;
    cardPhoto.style.display = 'block';
    cardPhotoPlaceholder.style.display = 'none';
    // 容错：照片加载失败时自动隐藏
    cardPhoto.onerror = function() {
      cardPhoto.style.display = 'none';
      cardPhotoPlaceholder.style.display = 'block';
    };
  } else {
    cardPhoto.style.display = 'none';
    cardPhotoPlaceholder.style.display = 'block';
  }

  cardText.textContent = wish.text;
  cardIndex.textContent = `第 ${index + 1} 颗星`;
  cardOverlay.classList.add('active');

  // 标记已发现
  if (!discovered.has(index)) {
    discovered.add(index);
    starEl.classList.add('discovered');
    spawnParticles(starEl);
    updateCounter();

    // 隐藏提示文字
    if (discovered.size >= 1) {
      hintEl.style.opacity = '0';
    }

    // 检查是否全部发现
    if (discovered.size >= totalStars) {
      setTimeout(() => {
        completeToast.classList.add('show');
        // 3 秒后自动隐藏
        setTimeout(() => completeToast.classList.remove('show'), 4000);
      }, 600);
    }
  }

  // 滚动到顶部
  card.scrollTop = 0;
}

function closeCard() {
  cardOverlay.classList.remove('active');
  currentStarIndex = -1;
}

cardClose.addEventListener('click', (e) => {
  e.stopPropagation();
  closeCard();
});

cardOverlay.addEventListener('click', (e) => {
  if (e.target === cardOverlay) {
    closeCard();
  }
});

// ESC 键关闭
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && cardOverlay.classList.contains('active')) {
    closeCard();
  }
});

function updateCounter() {
  countSpan.textContent = discovered.size;
  if (discovered.size >= totalStars) {
    counterEl.classList.add('complete');
    counterEl.innerHTML = '🎉 所有星星都已点亮！共 <span class="count">' + totalStars + '</span> 颗';
  }
}

// ========== 粒子爆发特效 ==========
function spawnParticles(starEl) {
  const rect = starEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const count = 14;

  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const dist = 20 + Math.random() * 35;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    const size = 2 + Math.random() * 3;
    const hue = 40 + Math.random() * 20;

    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.cssText = `
      left: ${cx}px;
      top: ${cy}px;
      width: ${size}px;
      height: ${size}px;
      background: hsl(${hue}, 90%, ${65 + Math.random() * 30}%);
      box-shadow: 0 0 ${size * 2}px hsl(${hue}, 90%, 70%);
      --dx: ${dx}px;
      --dy: ${dy}px;
    `;
    document.body.appendChild(particle);

    particle.addEventListener('animationend', () => {
      particle.remove();
    });
  }
}

// ========== 主循环 ==========
let time = 0;
let shootingStarTimer = 0;

function animate(ts) {
  time = ts;

  ctx.clearRect(0, 0, W, H);
  drawBgStars(time);

  // 随机生成流星 (每 4-12 秒)
  shootingStarTimer++;
  if (shootingStarTimer > 60 * (4 + Math.random() * 8) && shootingStars.length < 3) {
    spawnShootingStar();
    shootingStarTimer = 0;
  }

  requestAnimationFrame(animate);
}

// ========== 初始化 ==========
function init() {
  resizeCanvas();
  createBgStars();
  createWishStars();

  // 初始时生成一颗流星
  spawnShootingStar();

  requestAnimationFrame(animate);
}

// 窗口大小变化时重建
let resizeDebounce;
window.addEventListener('resize', () => {
  clearTimeout(resizeDebounce);
  resizeDebounce = setTimeout(() => {
    resizeCanvas();
    createBgStars();
    createWishStars();
    // 保持已发现的状态
    document.querySelectorAll('.wish-star').forEach(star => {
      const idx = parseInt(star.dataset.index);
      if (discovered.has(idx)) {
        star.classList.add('discovered');
      }
    });
  }, 300);
});

// 启动
init();
