<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✨ 刘语晴，生日快乐!</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:100vw; height:100vh; height:100dvh;
  overflow:hidden;
  background: linear-gradient(170deg, #3d2b1f 0%, #5c3d2e 30%, #4a3020 60%, #2a1a10 100%);
  font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;
  -webkit-tap-highlight-color:transparent;
  user-select:none; -webkit-user-select:none;
}

/* 桌面纹理 */
#desk {
  position:fixed; inset:0;
  background:
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,.008) 2px, rgba(255,255,255,.008) 4px),
    repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(0,0,0,.03) 80px, rgba(0,0,0,.03) 81px);
}

/* 串灯线 */
#fairy-lights {
  position:fixed; top:0; left:0; right:0; height:80px; z-index:2;
  pointer-events:none;
}
.light-bulb {
  position:absolute; width:8px; height:8px; border-radius:50%;
  background:#ffe8c0; box-shadow:0 0 12px 3px rgba(255,220,150,.7);
  animation:bulbGlow 2s ease-in-out infinite;
}
.light-bulb:nth-child(odd) { animation-delay:0s; }
.light-bulb:nth-child(even){ animation-delay:1s; }
@keyframes bulbGlow {
  0%,100% { opacity:.5; box-shadow:0 0 10px 2px rgba(255,220,150,.5); }
  50% { opacity:1; box-shadow:0 0 18px 5px rgba(255,230,170,.9); }
}

/* 标题 */
#header {
  position:fixed; top:10px; left:50%; transform:translateX(-50%); z-index:10;
  text-align:center; pointer-events:none;
}
#header .title {
  font-size:clamp(1.2rem,3vw,1.8rem); font-weight:700;
  color:rgba(255,240,220,.9);
  text-shadow:0 0 20px rgba(255,200,150,.4);
  letter-spacing:.05em;
}
#header .subtitle {
  font-size:clamp(.7rem,1.8vw,.85rem);
  color:rgba(255,220,200,.55); margin-top:2px;
}

/* 计数器 */
#counter {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:10;
  font-size:clamp(.75rem,1.8vw,.9rem); color:rgba(255,220,200,.6);
  letter-spacing:.04em; pointer-events:none;
}
#counter .count { color:#ffe0c0; font-weight:700; }
#counter.complete { color:#ffe0c0; text-shadow:0 0 15px rgba(255,200,150,.5); }

/* === 拍立得容器 === */
#polaroids {
  position:fixed; inset:60px 10px 60px 10px; z-index:5;
}

/* === 单张拍立得 === */
.polaroid {
  position:absolute;
  width:120px; perspective:600px;
  cursor:pointer;
  transition:transform .3s ease, z-index .3s ease;
  z-index:1;
}
.polaroid:hover { z-index:20; transform:scale(1.08); }
.polaroid.flipped { z-index:15; }

/* 拍立得卡片 */
.polaroid-inner {
  width:100%; background:#f8f4ee;
  border-radius:2px; padding:7px 7px 28px 7px;
  box-shadow:2px 3px 12px rgba(0,0,0,.35), 0 1px 3px rgba(0,0,0,.2);
  overflow:hidden;
}

/* 照片区域 */
.polaroid-photo {
  width:100%; aspect-ratio:1/1; object-fit:cover;
  display:block; background:#e8e0d8;
}
.polaroid-placeholder {
  width:100%; aspect-ratio:1/1;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, #f5ede0, #ede0d0);
  color:#c8b8a0; font-size:2rem;
}

/* 拍立得底部装饰线 */
.polaroid-inner::after {
  content:''; position:absolute; bottom:8px; left:50%;
  transform:translateX(-50%);
  width:30px; height:2px; background:rgba(180,150,120,.3);
  border-radius:1px;
}

/* 移动端适配 */
@media(max-width:768px) {
  .polaroid { width:100px; }
}

/* === 提示文字 === */
#hint {
  position:fixed; bottom:55px; left:50%; transform:translateX(-50%); z-index:10;
  font-size:.75rem; color:rgba(255,220,200,.4); pointer-events:none;
  animation:hintFade 3s ease-in-out infinite;
}
@keyframes hintFade {
  0%,100% { opacity:.3; }
  50% { opacity:.8; }
}

/* === 展开弹窗 === */
#modal-overlay {
  position:fixed; inset:0; z-index:200;
  display:flex; align-items:center; justify-content:center;
  background:rgba(10,5,0,0); pointer-events:none;
  transition:background .4s ease;
}
#modal-overlay.active {
  background:rgba(10,5,0,.75); pointer-events:auto;
}
#modal-card {
  width:min(90vw,420px); max-height:88vh; max-height:88dvh;
  background:#faf6ef; border-radius:8px; overflow-y:auto; overflow-x:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
  transform:translateY(30px) scale(.92); opacity:0;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1), opacity .35s ease;
}
#modal-overlay.active #modal-card {
  transform:translateY(0) scale(1); opacity:1;
}
#modal-card::-webkit-scrollbar { width:3px; }
#modal-card::-webkit-scrollbar-thumb { background:rgba(0,0,0,.15); border-radius:3px; }
#modal-card img {
  width:100%; display:block; background:#e8e0d8;
}
#modal-card .modal-body {
  padding:20px 24px 24px;
}
#modal-card .modal-text {
  font-size:clamp(.95rem,2.5vw,1.1rem); line-height:1.85;
  color:#4a3020; text-align:center; letter-spacing:.03em;
}
#modal-card .modal-index {
  text-align:center; font-size:.75rem; color:rgba(120,90,60,.4);
  margin-top:12px; letter-spacing:.05em;
}
#modal-card .modal-close {
  display:block; margin:16px auto 0; padding:10px 30px;
  background:#5c3d2e; border:none; border-radius:25px;
  color:#f5ede0; font-size:.9rem; cursor:pointer; letter-spacing:.05em;
  font-family:inherit;
}

/* === 完成弹窗 === */
#complete-toast {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.8); z-index:300;
  pointer-events:none; text-align:center; opacity:0;
  transition:all .8s cubic-bezier(.34,1.56,.64,1);
}
#complete-toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
#complete-toast .icon { font-size:3rem; display:block; }
#complete-toast .msg {
  font-size:1.2rem; color:#ffe0c0; margin-top:6px;
  text-shadow:0 0 20px rgba(255,200,150,.5);
}
</style>
</head>
<body>

<div id="desk"></div>
<div id="fairy-lights"></div>

<div id="header">
  <div class="title">📷 刘语晴 · 18岁回忆录</div>
  <div class="subtitle">点开照片，看看想对你说的话</div>
</div>

<div id="polaroids"></div>
<div id="hint">👆 点一张照片打开看看</div>

<div id="counter">看过了 <span class="count">0</span> / 15 张</div>

<div id="modal-overlay">
  <div id="modal-card">
    <img class="modal-photo" src="" alt="" style="display:none;">
    <div class="modal-body">
      <div class="modal-text"></div>
      <div class="modal-index"></div>
      <button class="modal-close">收起来 📷</button>
    </div>
  </div>
</div>

<div id="complete-toast">
  <span class="icon">🎂</span>
  <div class="msg">全部翻开了！生日快乐🎉</div>
</div>

<script>
// ============================================================================
// ✏️ 在这里编辑你的祝福和照片
// ============================================================================
const wishes = [
  {
    text: "恭喜你在地球online这款游戏中，又成功续费一年VIP！",
    photo: "7.jpg"
  },
  {
    text: "愿你在新的一岁，匹配到的全是厉害的队友(特别是我这种),打出的全是叮叮叮的爆头！，遇到的全是人体描边大师！",
    photo: "8.jpg"
  },
  {
    text: "你刘姐打台球！",
    photo: "6.jpg"
  },
  {
    text: "跟你玩了这么久，发现你变外向活泼了很多，替你感到高兴！",
    photo: "10.jpg"
  },
  {
    text: "上无畏契约有惊喜哦！",
    photo: null
  },
  {
    text: "奶茶卡一张！持有词卡可以无条件赠送奶茶一杯，品牌任选！",
    photo: "5.jpg"
  },
  {
    text: "一起看海",
    photo: "3.jpg"
  },
  {
    text: "大制作哦！",
    photo: "2.jpg"
  },
  {
    text: "天天开♥",
    photo: "1.jpg"
  },
  {
    text: "你刘姐的五杀！！！",
    photo: "4.jpg"
  },
  {
    text: "谢谢你一直陪我玩游戏，陪我走过无数个地图，拿过无数次胜利，生日快乐刘姐",
    photo: null
  },
  {
    text: "祝贺你长大成人，可以去网吧了！你刘姐必须订个电竞酒店狠狠玩！",
    photo: "9.jpg"
  },
  {
    text: "生日快乐呀！希望你许的愿望都能实现，就像你点亮的这些星星一样，一颗一颗，慢慢成真。",
    photo: "12.jpg"
  },
  {
    text: "没带你上银银挺愧疚的，你跟我打了那么久，还是我太菜了，不好意思说/(ㄒoㄒ)/~~",
    photo: "11.jpg"
  },
  {
    text: "你玩游戏很厉害，学东西很快，并没有别人说的那么菜，希望你越来越强，越来越厉害！",
    photo: "13.jpg"
  }
];

// ============================================================================
// 下面的代码不用管
// ============================================================================
const isMobile = /Mobi|Android/i.test(navigator.userAgent);

// 串灯
const lights = document.getElementById('fairy-lights');
for(let i=0; i<18; i++) {
  const b = document.createElement('div');
  b.className = 'light-bulb';
  b.style.left = (3 + i*94/17) + '%';
  b.style.top = (15 + Math.sin(i*1.7)*20) + 'px';
  lights.appendChild(b);
}

// 拍立得
const container = document.getElementById('polaroids');
const counterEl = document.getElementById('counter');
const countSpan = counterEl.querySelector('.count');
const hintEl = document.getElementById('hint');
const toast = document.getElementById('complete-toast');
const modalOverlay = document.getElementById('modal-overlay');
const modalCard = document.getElementById('modal-card');
const modalPhoto = modalCard.querySelector('.modal-photo');
const modalText = modalCard.querySelector('.modal-text');
const modalIndex = modalCard.querySelector('.modal-index');
const modalClose = modalCard.querySelector('.modal-close');
let opened = new Set();

// 关闭弹窗
function closeModal() {
  modalOverlay.classList.remove('active');
  modalPhoto.src = '';
  modalPhoto.style.display = 'none';
}
modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if(e.target === modalOverlay) closeModal();
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closeModal();
});

function openModal(index) {
  const wish = wishes[index];
  // 照片
  if(wish.photo) {
    modalPhoto.style.display = 'block';
    modalPhoto.onerror = null;
    modalPhoto.src = wish.photo;
    modalPhoto.onerror = function() { modalPhoto.style.display = 'none'; };
  } else {
    modalPhoto.style.display = 'none';
  }
  modalText.textContent = wish.text;
  modalIndex.textContent = '#' + (index+1);
  modalCard.scrollTop = 0;
  modalOverlay.classList.add('active');

  // 标记已打开
  if(!opened.has(index)) {
    opened.add(index);
    if(opened.size === 1) hintEl.style.opacity = '0';
    countSpan.textContent = opened.size;
    if(opened.size >= total) {
      counterEl.classList.add('complete');
      counterEl.innerHTML = '🎉 全部看完了！共 <span class="count">'+total+'</span> 张';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }
  }
}

// 网格布局 + 随机偏移
const total = wishes.length;
const cols = 5;
const rows = Math.ceil(total / cols);
const cellW = 100 / cols;
const cellH = 100 / rows;

for(let i=0; i<total; i++) {
  const wish = wishes[i];
  const col = i % cols;
  const row = Math.floor(i / cols);
  const baseX = cellW * col + cellW/2;
  const baseY = cellH * row + cellH/2;
  const rx = (Math.random()-.5)*10;
  const ry = (Math.random()-.5)*10;
  const rot = (Math.random()-.5)*14;

  const el = document.createElement('div');
  el.className = 'polaroid';
  el.style.left = `calc(${baseX}% - 60px)`;
  el.style.top = `calc(${baseY}% - 80px)`;
  el.style.transform = `translate(${rx}px, ${ry}px) rotate(${rot}deg)`;
  el.dataset.index = i;

  const frontContent = wish.photo
    ? `<div style="position:relative;width:100%;aspect-ratio:1/1;background:#e8e0d8;">
         <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;">📷</div>
         <img class="polaroid-photo" src="${wish.photo}" style="position:relative;z-index:1;" onerror="this.style.opacity='0'" alt="">
       </div>`
    : `<div class="polaroid-placeholder">💝</div>`;

  el.innerHTML = `<div class="polaroid-inner">${frontContent}</div>`;

  el.addEventListener('click', (e) => {
    e.stopPropagation();
    openModal(i);
  });

  container.appendChild(el);
}

// 移动端缩小
if(isMobile) {
  document.querySelectorAll('.polaroid').forEach(p => {
    p.style.width = '90px';
  });
}

console.log('📷 拍立得桌面已就绪！');
console.log('💡 编辑 wishes 数组修改祝福语');
console.log('🎂 刘语晴 生日快乐！');
</script>
</body>
</html>
